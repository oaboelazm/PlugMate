<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-header {
            background: linear-gradient(135deg, rgba(195, 245, 255, 0.05) 0%, rgba(0, 229, 255, 0.02) 100%);
            backdrop-filter: blur(20px);
        }
        .inner-glow-primary {
            box-shadow: inset 0 0 12px rgba(0, 229, 255, 0.1);
        }
        .color-pulse {
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#c3f5ff",
                      "surface-container-highest": "#353534",
                      "on-surface": "#e5e2e1",
                      "on-surface-variant": "#bac9cc",
                      "secondary-container": "#6e06d0",
                      "on-background": "#e5e2e1",
                      "surface-container-lowest": "#0e0e0e",
                      "surface-dim": "#131313",
                      "on-secondary-fixed": "#290055",
                      "tertiary-fixed": "#50ffb0",
                      "on-tertiary-container": "#006641",
                      "secondary-fixed-dim": "#d8b9ff",
                      "on-primary-container": "#00626e",
                      "surface-bright": "#393939",
                      "surface-tint": "#00daf3",
                      "background": "#131313",
                      "secondary-fixed": "#eddcff",
                      "tertiary-fixed-dim": "#1fe296",
                      "error-container": "#93000a",
                      "inverse-on-surface": "#313030",
                      "on-error": "#690005",
                      "primary-fixed": "#9cf0ff",
                      "surface": "#131313",
                      "surface-container": "#201f1f",
                      "surface-container-low": "#1c1b1b",
                      "on-tertiary-fixed": "#002112",
                      "on-tertiary-fixed-variant": "#005233",
                      "on-tertiary": "#003822",
                      "on-error-container": "#ffdad6",
                      "inverse-primary": "#006875",
                      "inverse-surface": "#e5e2e1",
                      "outline-variant": "#3b494c",
                      "tertiary": "#a8ffcd",
                      "on-secondary-fixed-variant": "#6200bc",
                      "primary-fixed-dim": "#00daf3",
                      "primary-container": "#00e5ff",
                      "error": "#ffb4ab",
                      "on-primary-fixed-variant": "#004f58",
                      "on-secondary-container": "#d5b5ff",
                      "on-primary-fixed": "#001f24",
                      "secondary": "#d8b9ff",
                      "on-secondary": "#450086",
                      "outline": "#849396",
                      "tertiary-container": "#34ec9f",
                      "surface-container-high": "#2a2a2a",
                      "on-primary": "#00363d",
                      "surface-variant": "#353534"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Manrope"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen selection:bg-primary-container/30">
<!-- TopAppBar Shell -->
<header class="bg-[#131313] dark:bg-[#131313] w-full top-0 z-50 flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-[#2a2a2a] p-2 rounded-full transition-colors duration-300">arrow_back</button>
<h1 class="font-['Manrope'] headline-md tracking-tight text-[#c3f5ff] font-bold text-xl">Device Settings</h1>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#c3f5ff] hover:bg-[#2a2a2a] p-2 rounded-full transition-colors duration-300" data-icon="done">done</span>
</div>
</header>
<main class="max-w-4xl mx-auto px-6 py-8 pb-32">
<div class="grid grid-cols-1 md:grid-cols-12 gap-8">
<!-- Preview Panel (Sticky) -->
<div class="md:col-span-5 order-first md:order-last">
<div class="sticky top-24">
<p class="font-headline text-on-surface-variant text-sm mb-6 uppercase tracking-widest px-1">Live Preview</p>
<div class="relative group">
<!-- Preview Card -->
<div class="bg-surface-container-high rounded-lg p-8 aspect-square flex flex-col justify-between overflow-hidden relative">
<!-- Background Accent Glow -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container/10 rounded-full blur-[80px]"></div>
<div class="z-10">
<div class="w-16 h-16 bg-primary-container/20 border border-primary/20 rounded-2xl flex items-center justify-center mb-6 inner-glow-primary">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="light">light</span>
</div>
<h3 class="font-headline text-3xl font-bold text-on-surface tracking-tight" id="preview-name">Living Room Main</h3>
<p class="text-on-surface-variant text-sm mt-2 font-medium">Luminous Obsidian Suite</p>
</div>
<div class="flex justify-between items-end z-10">
<div class="space-y-1">
<span class="text-[10px] text-tertiary-fixed-dim uppercase tracking-widest font-bold">Status</span>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-tertiary-fixed-dim shadow-[0_0_8px_#1fe296]"></span>
<span class="text-on-surface font-semibold">Active</span>
</div>
</div>
<div class="bg-surface-bright/50 backdrop-blur-md px-4 py-2 rounded-full border border-outline-variant/15">
<span class="text-primary-container font-headline font-extrabold text-xl">84%</span>
</div>
</div>
</div>
<!-- Decoration -->
<div class="absolute -z-10 inset-0 translate-x-4 translate-y-4 rounded-lg bg-surface-container-low border border-outline-variant/10"></div>
</div>
</div>
</div>
<!-- Customization Flow -->
<div class="md:col-span-7 space-y-12">
<!-- Rename Section -->
<section>
<label class="block font-headline text-lg font-bold text-on-surface mb-4">Identity</label>
<div class="bg-surface-container-low rounded-lg p-1 group focus-within:ring-2 ring-primary-container/20 transition-all">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface font-body px-5 py-4 placeholder:text-on-surface-variant/30 text-lg" placeholder="e.g. Bedside Lamp" type="text" value="Living Room Main"/>
</div>
<p class="text-on-surface-variant text-xs mt-3 px-1 leading-relaxed">Give your device a name that fits its personality or location.</p>
</section>
<!-- Icon Grid -->
<section>
<label class="block font-headline text-lg font-bold text-on-surface mb-6">Visual Anchor</label>
<div class="grid grid-cols-4 sm:grid-cols-5 gap-4">
<!-- Icon Option: Active -->
<button class="aspect-square rounded-2xl bg-primary-container/10 border-2 border-primary-container flex items-center justify-center transition-all scale-95 duration-200">
<span class="material-symbols-outlined text-primary-container text-2xl" data-icon="light">light</span>
</button>
<!-- Other Icons -->
<button class="aspect-square rounded-2xl bg-surface-container-low border border-outline-variant/15 flex items-center justify-center hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface" data-icon="bolt">bolt</span>
</button>
<button class="aspect-square rounded-2xl bg-surface-container-low border border-outline-variant/15 flex items-center justify-center hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface" data-icon="ac_unit">ac_unit</span>
</button>
<button class="aspect-square rounded-2xl bg-surface-container-low border border-outline-variant/15 flex items-center justify-center hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface" data-icon="tv">tv</span>
</button>
<button class="aspect-square rounded-2xl bg-surface-container-low border border-outline-variant/15 flex items-center justify-center hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface" data-icon="kitchen">kitchen</span>
</button>
<button class="aspect-square rounded-2xl bg-surface-container-low border border-outline-variant/15 flex items-center justify-center hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface" data-icon="nest_cam_wired_stand">nest_cam_wired_stand</span>
</button>
<button class="aspect-square rounded-2xl bg-surface-container-low border border-outline-variant/15 flex items-center justify-center hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface" data-icon="speaker">speaker</span>
</button>
<button class="aspect-square rounded-2xl bg-surface-container-low border border-outline-variant/15 flex items-center justify-center hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface" data-icon="smart_toy">smart_toy</span>
</button>
</div>
</section>
<!-- Accent Color Picker -->
<section>
<label class="block font-headline text-lg font-bold text-on-surface mb-6">Atmospheric Tone</label>
<div class="flex items-center gap-6 bg-surface-container-low p-4 rounded-2xl border border-outline-variant/10">
<!-- Cyan (Active) -->
<button class="w-12 h-12 rounded-full bg-primary-container ring-4 ring-primary-container/20 color-pulse transition-transform hover:scale-110 active:scale-90 flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-fixed text-lg" data-icon="check">check</span>
</button>
<!-- Purple -->
<button class="w-10 h-10 rounded-full bg-secondary-container transition-transform hover:scale-110 active:scale-90"></button>
<!-- Green -->
<button class="w-10 h-10 rounded-full bg-tertiary-fixed-dim transition-transform hover:scale-110 active:scale-90"></button>
<!-- Error/Reddish -->
<button class="w-10 h-10 rounded-full bg-error transition-transform hover:scale-110 active:scale-90"></button>
<!-- Divider -->
<div class="h-8 w-px bg-outline-variant/30 ml-auto mr-2"></div>
<!-- Custom -->
<button class="material-symbols-outlined text-on-surface-variant hover:text-on-surface transition-colors" data-icon="palette">palette</button>
</div>
</section>
<!-- Action Bar -->
<div class="pt-10 flex gap-4">
<button class="flex-1 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-5 rounded-lg text-lg transition-transform active:scale-95 shadow-[0_8px_30px_rgba(0,229,255,0.2)]">
                        Apply Changes
                    </button>
<button class="bg-surface-container-high text-on-surface-variant px-8 py-5 rounded-lg font-bold hover:text-on-surface transition-colors">
                        Reset
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pt-3 pb-8 px-4 bg-[#131313]/80 backdrop-blur-xl z-50 rounded-t-[32px] shadow-[0px_-4px_40px_rgba(0,218,243,0.06)]">
<div class="flex flex-col items-center justify-center text-[#e5e2e1]/60 px-5 py-2 hover:text-[#c3f5ff] transition-all">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest mt-1">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e5e2e1]/60 px-5 py-2 hover:text-[#c3f5ff] transition-all">
<span class="material-symbols-outlined" data-icon="palette">palette</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest mt-1">Scenes</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e5e2e1]/60 px-5 py-2 hover:text-[#c3f5ff] transition-all">
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest mt-1">Energy</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e5e2e1]/60 px-5 py-2 hover:text-[#c3f5ff] transition-all">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest mt-1">Alerts</span>
</div>
</nav>
</body></html>
